<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能会议记录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1677ff 0%,#0958d9 100%);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(22,119,255,.3);position:fixed;top:0;left:0;right:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:17px;font-weight:600}
.header-subtitle{font-size:12px;opacity:.75}
.header-status{display:flex;align-items:center;gap:6px;font-size:13px;opacity:.9}
.status-dot{width:8px;height:8px;border-radius:50%;background:#52c41a;animation:pulse 2s infinite}
.status-dot.recording{background:#ff4d4f}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
.main{margin-top:56px;display:flex;height:calc(100vh - 56px)}
.sidebar{width:280px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-section{padding:16px;border-bottom:1px solid #f0f0f0}
.sidebar-section-title{font-size:12px;color:#8c8c8c;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.btn-record{width:100%;height:52px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-record.start{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;box-shadow:0 4px 12px rgba(22,119,255,.35)}
.btn-record.start:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(22,119,255,.45)}
.btn-record.stop{background:linear-gradient(135deg,#ff4d4f,#d9363e);color:#fff;box-shadow:0 4px 12px rgba(255,77,79,.35)}
.btn-record:disabled{opacity:.5;cursor:not-allowed}
.btn-action{width:100%;height:38px;border:1px solid #d9d9d9;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;color:#333}
.btn-action:hover{border-color:#1677ff;color:#1677ff;background:#f0f5ff}
.btn-action.primary{background:#1677ff;color:#fff;border-color:#1677ff}
.btn-action.primary:hover{background:#0958d9}
.btn-action:last-child{margin-bottom:0}
.wave-container{height:48px;display:flex;align-items:center;justify-content:center;gap:3px;margin:12px 0}
.wave-bar{width:4px;border-radius:2px;background:#1677ff;height:8px}
.wave-bar.active{animation:wave .8s ease-in-out infinite}
.wave-bar:nth-child(2){animation-delay:.1s}.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.3s}.wave-bar:nth-child(5){animation-delay:.4s}.wave-bar:nth-child(6){animation-delay:.3s}.wave-bar:nth-child(7){animation-delay:.2s}.wave-bar:nth-child(8){animation-delay:.1s}
@keyframes wave{0%,100%{height:8px}50%{height:36px}}
.duration{text-align:center;font-size:24px;font-weight:300;color:#1677ff;letter-spacing:2px;padding:4px 0}
.duration.inactive{color:#bfbfbf}
.participant-input{width:100%;height:34px;border:1px solid #d9d9d9;border-radius:6px;padding:0 10px;font-size:13px;outline:none;transition:border-color .2s}
.participant-input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.participant-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:28px}
.participant-tag{background:#f0f5ff;border:1px solid #adc6ff;color:#1677ff;border-radius:12px;padding:2px 10px;font-size:12px;display:flex;align-items:center;gap:4px}
.participant-tag .remove{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.participant-tag .remove:hover{opacity:1}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px}
.tab{padding:14px 16px 12px;font-size:14px;cursor:pointer;color:#8c8c8c;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500}
.tab:hover:not(.active){color:#333}
.tab-content{display:none;flex:1;overflow-y:auto;padding:24px;flex-direction:column;gap:16px}
.tab-content.active{display:flex}
.transcript-box{flex:1;background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:20px;overflow-y:auto;min-height:200px;max-height:calc(100vh - 260px)}
.transcript-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bfbfbf;gap:12px}
.transcript-empty .icon{font-size:48px}
.transcript-empty p{font-size:14px}
.transcript-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5;animation:fadeIn .3s ease}
.transcript-item:last-child{border-bottom:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.transcript-avatar{width:32px;height:32px;border-radius:50%;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.transcript-body{flex:1}
.transcript-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.transcript-name{font-size:13px;font-weight:500;color:#333}
.transcript-time{font-size:11px;color:#bfbfbf}
.transcript-text{font-size:14px;color:#333;line-height:1.6}
.transcript-text.interim{color:#8c8c8c;font-style:italic}
.minutes-card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;display:flex;flex-direction:column;height:100%}
.minutes-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.minutes-title-row{display:flex;align-items:center;gap:10px}
.minutes-icon{width:36px;height:36px;background:linear-gradient(135deg,#1677ff,#722ed1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.minutes-title{font-size:16px;font-weight:600;color:#333}
.minutes-date{font-size:12px;color:#8c8c8c;margin-top:2px}
.minutes-body{padding:20px;font-size:14px;color:#333;line-height:1.8;white-space:pre-wrap;min-height:200px;overflow-y:auto;max-height:calc(100vh - 280px)}
.loading-row{display:flex;align-items:center;gap:10px;color:#1677ff;padding:20px}
.spinner{width:20px;height:20px;border:2px solid #e8e8e8;border-top-color:#1677ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.summary-card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:16px}
.summary-card-title{font-size:13px;color:#8c8c8c;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.keyword-tag{background:#f0f5ff;color:#1677ff;border-radius:4px;padding:2px 8px;font-size:12px}
.action-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.action-item:last-child{border-bottom:none}
.action-check{width:16px;height:16px;border:2px solid #d9d9d9;border-radius:4px;margin-top:2px;flex-shrink:0;cursor:pointer}
.action-check.checked{border-color:#52c41a;background:#52c41a}
.toast{position:fixed;top:70px;right:24px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:#52c41a}
.toast.error{background:#ff4d4f}
/* 文档模式渲染样式 */
.minutes-body .doc-view{white-space:normal}
.doc-view h1{font-size:20px;font-weight:700;margin:16px 0 10px;color:#1a1a1a;border-bottom:2px solid #e8e8e8;padding-bottom:6px}
.doc-view h2{font-size:17px;font-weight:600;margin:14px 0 8px;color:#1a1a1a}
.doc-view h3{font-size:15px;font-weight:600;margin:12px 0 6px;color:#333}
.doc-view p{margin:6px 0;line-height:1.8}
.doc-view ul{margin:6px 0;padding-left:22px}
.doc-view li{margin:3px 0;line-height:1.7}
.doc-view strong{font-weight:600;color:#1a1a1a}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">&#127897;</div>
    <div>
      <div class="header-title">智能会议记录</div>
      <div class="header-subtitle">AI驱动 · 实时转写 · 自动生成纪要</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">待机中</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title">录音控制</div>
      <button class="btn-record start" id="btnRecord" onclick="toggleRecord()">&#127897; 开始录音</button>
      <div class="wave-container">
        <div class="wave-bar" id="w1"></div><div class="wave-bar" id="w2"></div><div class="wave-bar" id="w3"></div><div class="wave-bar" id="w4"></div><div class="wave-bar" id="w5"></div><div class="wave-bar" id="w6"></div><div class="wave-bar" id="w7"></div><div class="wave-bar" id="w8"></div>
      </div>
      <div class="duration inactive" id="durationDisplay">00:00:00</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">会议信息</div>
      <input class="participant-input" id="meetingTitle" placeholder="会议主题（选填）" style="margin-bottom:8px">
      <input class="participant-input" id="participantInput" placeholder="参会人，回车添加" onkeydown="addParticipant(event)">
      <div class="participant-list" id="participantList"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">📎 智能附件</div>
      <input type="file" id="fileInput" accept="image/*,.pdf,.docx,.doc,.pptx,.ppt,.txt,.md" style="display:none;">
      <button class="btn-action primary" onclick="document.getElementById('fileInput').click()">
        📤 上传并识别（支持图片/PDF/Word/PPT/TXT）
      </button>
      <div id="fileStatus" style="font-size:12px;color:#52c41a;margin-top:6px;height:18px;"></div>
      <div id="filePreview" style="margin-top:12px;max-height:100px;overflow:auto;font-size:13px;color:#333;"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">操作</div>
      <button class="btn-action primary" onclick="generateMinutes()">✨ AI生成会议纪要</button>
      <button class="btn-action" onclick="copyMinutes()">📋 复制会议纪要</button>
      <button class="btn-action" onclick="exportMinutes()">📄 导出Word纪要</button>
      <button class="btn-action" onclick="clearAll()">🗑️ 清空重置</button>
    </div>
  </div>

  <div class="content-area">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('transcript',this)">&#127897; 实时转写</div>
      <div class="tab" onclick="switchTab('minutes',this)">📝 会议纪要</div>
      <div class="tab" onclick="switchTab('summary',this)">📊 摘要分析</div>
    </div>
    <div class="tab-content active" id="tab-transcript">
      <div class="transcript-box" id="transcriptBox">
        <div class="transcript-empty" id="transcriptEmpty">
          <div class="icon">&#127897;</div>
          <p>点击"开始录音"开始实时转写</p>
          <p style="font-size:12px;color:#d9d9d9">需要Chrome浏览器并允许麦克风权限</p>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-minutes">
      <div class="minutes-card">
        <div class="minutes-header">
          <div class="minutes-title-row">
            <div class="minutes-icon">📝</div>
            <div>
              <div class="minutes-title" id="minutesTitle">会议纪要</div>
              <div class="minutes-date" id="minutesDate"></div>
            </div>
          </div>
          <button class="btn-action" style="width:auto;padding:0 12px;margin:0" onclick="generateMinutes()">✨ 重新生成</button>
        </div>
        <div class="minutes-body" id="minutesBody"><div style="color:#bfbfbf;text-align:center;padding:40px">点击左侧"AI生成会议纪要"按钮，将根据转写内容自动生成结构化纪要</div></div>
      </div>
    </div>
    <div class="tab-content" id="tab-summary">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-card-title">🔑 关键词</div>
          <div class="tag-list" id="keywordList"><span style="color:#bfbfbf;font-size:12px">生成纪要后显示</span></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-title">👥 参会人员</div>
          <div class="tag-list" id="participantDisplay"><span style="color:#bfbfbf;font-size:12px">添加参会人后显示</span></div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-card-title">✅ 待办事项</div>
        <div id="actionList"><div style="color:#bfbfbf;font-size:13px;text-align:center;padding:20px">生成纪要后自动提取</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-card-title">💡 会议摘要</div>
        <div id="meetingSummary" style="font-size:13px;line-height:1.7;color:#333"><span style="color:#bfbfbf">生成纪要后显示</span></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var isRecording=false,recognition=null,transcript=[],startTime=null,durationTimer=null,interimItem=null,_lastMinutesMd='';
// 从 URL 参数读取端口，兼容 main.js 动态端口
var _urlPort=(new URLSearchParams(location.search)).get('port');
var SERVER='http://127.0.0.1:'+(_urlPort||location.port||'18765');

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(function(){t.className='toast';},3000);
}
function fmt(sec){
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return [h,m,s].map(function(v){return String(v).padStart(2,'0')}).join(':');
}
function ts(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function elapsed(){return startTime?Math.floor((Date.now()-startTime)/1000):0;}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

var participants=[];
function addParticipant(e){
  if(e.key!=='Enter')return;
  var inp=document.getElementById('participantInput');
  var n=inp.value.trim();
  if(!n||participants.indexOf(n)>=0){inp.value='';return;}
  participants.push(n);inp.value='';renderParticipants();
}
function removeParticipant(n){
  participants=participants.filter(function(p){return p!==n;});renderParticipants();
}
function renderParticipants(){
  document.getElementById('participantList').innerHTML=participants.map(function(p){
    return '<div class="participant-tag">'+esc(p)+'<span class="remove" onclick="removeParticipant(\''+esc(p)+'\')">×</span></div>';
  }).join('');
  var disp=document.getElementById('participantDisplay');
  disp.innerHTML=participants.length===0?'<span style="color:#bfbfbf;font-size:12px">添加参会人后显示</span>':participants.map(function(p){return '<div class="keyword-tag">👤 '+esc(p)+'</div>';}).join('');
}

function startWave(){for(var i=1;i<=8;i++)document.getElementById('w'+i).classList.add('active');}
function stopWave(){for(var i=1;i<=8;i++){var b=document.getElementById('w'+i);b.classList.remove('active');b.style.height='8px';}}

function startTimer(){
  startTime=Date.now();
  durationTimer=setInterval(function(){
    document.getElementById('durationDisplay').textContent=fmt(elapsed());
  },1000);
  document.getElementById('durationDisplay').classList.remove('inactive');
}
function stopTimer(){clearInterval(durationTimer);}

function toggleRecord(){if(!isRecording)startRecording();else stopRecording();}

function startRecording(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    showToast('浏览器不支持语音识别，请使用Chrome','error');
    document.getElementById('transcriptEmpty').innerHTML='<div class="icon">⚠️</div><p style="color:#ff4d4f">请使用 Chrome 浏览器打开此页面</p><p style="font-size:12px">Edge / Safari 不支持实时语音识别</p>';
    return;
  }
  // 先用 getUserMedia 申请麦克风权限，Chrome 要求必须先授权才能用 SpeechRecognition
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    // 拿到权限后立即释放 stream（SpeechRecognition 会自己管理麦克风）
    stream.getTracks().forEach(function(t){t.stop();});
    _doStartRecognition(SR);
  }).catch(function(err){
    if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){
      showToast('麦克风权限被拒绝，请点击地址栏左侧的锁图标 → 允许麦克风','error');
      document.getElementById('transcriptEmpty').innerHTML='<div class="icon">🎤</div><p style="color:#ff4d4f;font-weight:600">需要麦克风权限</p><p style="font-size:13px;color:#666;margin-top:4px">请点击浏览器地址栏左侧的 🔒 图标</p><p style="font-size:13px;color:#666">将"麦克风"设置为"允许"后刷新页面</p>';
    } else {
      showToast('无法访问麦克风：'+err.message,'error');
    }
  });
}

function _doStartRecognition(SR){
  recognition=new SR();
  recognition.continuous=true;recognition.interimResults=true;recognition.lang='zh-CN';recognition.maxAlternatives=1;
  recognition.onstart=function(){
    isRecording=true;
    document.getElementById('btnRecord').className='btn-record stop';
    document.getElementById('btnRecord').innerHTML='⏹️ 停止录音';
    document.getElementById('statusDot').className='status-dot recording';
    document.getElementById('statusText').textContent='录音中...';
    startWave();startTimer();hideEmpty();showToast('开始录音','success');
  };
  recognition.onresult=function(event){
    var interim='',final_text='';
    for(var i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal)final_text=event.results[i][0].transcript.trim();
      else interim=event.results[i][0].transcript.trim();
    }
    if(final_text){removeInterim();addItem(final_text);sendResult(final_text,'transcript');}
    else if(interim)updateInterim(interim);
  };
  recognition.onerror=function(event){
    if(event.error==='not-allowed'){showToast('麦克风权限被拒绝，请在地址栏允许麦克风','error');stopRecording();}
    else if(event.error==='network'){showToast('网络错误，语音识别需要联网','error');}
    else if(event.error!=='no-speech')showToast('识别出错: '+event.error,'error');
  };
  recognition.onend=function(){if(isRecording){try{recognition.start();}catch(e){}}};
  try{recognition.start();}catch(e){showToast('无法启动识别: '+e.message,'error');}
}

function stopRecording(){
  isRecording=false;
  if(recognition){recognition.onend=null;recognition.stop();recognition=null;}
  document.getElementById('btnRecord').className='btn-record start';
  document.getElementById('btnRecord').innerHTML='&#127897; 开始录音';
  document.getElementById('statusDot').className='status-dot';
  document.getElementById('statusText').textContent='录音已停止';
  stopWave();stopTimer();removeInterim();showToast('录音已停止');
}

function hideEmpty(){var e=document.getElementById('transcriptEmpty');if(e)e.style.display='none';}

var colors=['#1677ff','#722ed1','#eb2f96','#fa8c16','#52c41a'];
function addItem(text){
  var box=document.getElementById('transcriptBox');
  var el=document.createElement('div');el.className='transcript-item';
  var sp=participants.length>0?participants[Math.floor(Math.random()*participants.length)]:'发言人';
  var col=colors[Math.abs(sp.charCodeAt(0))%colors.length];
  var t=fmt(elapsed()),ts2=ts();
  el.innerHTML='<div class="transcript-avatar" style="background:'+col+'">'+esc(sp.charAt(0))+'</div><div class="transcript-body"><div class="transcript-meta"><span class="transcript-name">'+esc(sp)+'</span><span class="transcript-time">'+ts2+' ['+t+']</span></div><div class="transcript-text">'+esc(text)+'</div></div>';
  box.appendChild(el);box.scrollTop=box.scrollHeight;
  transcript.push({time:t,timestamp:ts2,speaker:sp,text:text});
}
function updateInterim(text){
  removeInterim();
  var box=document.getElementById('transcriptBox');
  var el=document.createElement('div');el.className='transcript-item interim-item';
  el.innerHTML='<div class="transcript-avatar" style="background:#bfbfbf">…</div><div class="transcript-body"><div class="transcript-meta"><span class="transcript-name">识别中</span><span class="transcript-time">'+ts()+'</span></div><div class="transcript-text interim">'+esc(text)+'</div></div>';
  box.appendChild(el);box.scrollTop=box.scrollHeight;interimItem=el;
}

function extractSummary(minutes,txText){
  var words=txText.split(/[\s，。！？、：；]/);
  var freq={};
  words.forEach(function(w){if(w.length>=2)freq[w]=(freq[w]||0)+1;});
  var kws=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(e){return e[0];});
  document.getElementById('keywordList').innerHTML=kws.map(function(k){return '<div class="keyword-tag">'+esc(k)+'</div>';}).join('');
  document.getElementById('meetingSummary').textContent=minutes.substring(0,200)+(minutes.length>200?'...':'');
  var actions=minutes.split('\n').filter(function(l){return l.match(/负责|安排|完成|跟进|确认|提交|准备|整理|联系/);}).slice(0,5);
  var al=document.getElementById('actionList');
  if(actions.length>0)al.innerHTML=actions.map(function(l){return '<div class="action-item"><div class="action-check" onclick="this.classList.toggle(\'checked\')"></div><span>'+esc(l.replace(/^[-•*\d.]\s*/,''))+'</span></div>';}).join('');
}

function markdownToHtml(md){
  var html=md;
  // 转义 HTML 特殊字符（但保留 Markdown 标记）
  html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 标题：# ## ###
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // 粗体
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // 斜体
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // 无序列表
  html=html.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>\n?)+/g,function(match){return '<ul>'+match+'</ul>';});
  // 有序列表
  html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // 换行转段落
  html=html.replace(/\n\n/g,'</p><p>');
  html=html.replace(/\n/g,'<br>');
  html='<p>'+html+'</p>';
  // 清理空段落
  html=html.replace(/<p>\s*<\/p>/g,'');
  html=html.replace(/<p>\s*(<h[123]>)/g,'$1');
  html=html.replace(/(<\/h[123]>)\s*<\/p>/g,'$1');
  html=html.replace(/<p>\s*(<ul>)/g,'$1');
  html=html.replace(/(<\/ul>)\s*<\/p>/g,'$1');
  return html;
}
